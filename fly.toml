# fly.toml app configuration file generated for trader-tony-v4 on 2026-06-02T15:27:44-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trader-tony-v4'
primary_region = 'ord'

[build]

[env]
  # Boot directly into the Migrated (graduated tokens) strategy and start
  # trading without manual intervention. NOTE: `fly secrets` with the same
  # name override these values - keep ACTIVE_STRATEGY out of secrets.
  ACTIVE_STRATEGY = 'migrated'
  AUTO_START_TRADING = 'true'
  RUST_LOG = 'info'
  # Safe default: simulate trades. Go live with:
  #   fly secrets set DRY_RUN_MODE=false
  # (secrets override this value; unset the secret to return to dry-run)
  DRY_RUN_MODE = 'true'
  DEMO_MODE = 'false'

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
